<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--bg-sec);">

    <div style="padding: 20px;">
        <a href="/" class="btn" style="background-color: var(--text-main);">&larr; Вернуться на сайт</a>
    </div>

    <div id="accessDenied">ОШИБКА ДОСТУПА: Только для администратора</div>

    <div class="admin-container" id="adminPanel">
        <h2 style="margin-bottom: 30px;">Управление сайтом</h2>

        <div class="admin-section">
            <h3>1. Главный баннер (Hero)</h3>
            <div class="form-group">
                <label>Заголовок (H1)</label>
                <input type="text" id="heroTitleInput">
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label>Описание</label>
                <textarea id="heroDescInput" rows="2" style="width: 100%; padding: 10px;"></textarea>
            </div>
        </div>

        <div class="admin-section">
            <h3>2. Наше меню (Карточки)</h3>
            <div id="menuContainer" class="dynamic-list"></div>
            <button class="btn btn-add" onclick="addMenuItem()">+ Добавить напиток</button>
        </div>

        <div class="admin-section">
            <h3>3. Наша команда (Слайдер)</h3>
            <div id="teamContainer" class="dynamic-list"></div>
            <button class="btn btn-add" onclick="addTeamItem()">+ Добавить сотрудника</button>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="saveContent()" style="font-size: 1.2rem; padding: 15px 40px;">💾 Сохранить все изменения</button>
        </div>
        <div id="saveResult" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
